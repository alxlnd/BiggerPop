<style>

.cf,.cb{backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:9px;border:1px solid #2a2a2a;background:#1a1a1a;box-shadow:0 2px 8px rgba(0,0,0,.4)}

.pb{font-size:8px;font-weight:700;letter-spacing:.8px;padding:2px 6px;border-radius:3px;white-space:nowrap}
.p-HIGH{background:#3a0a0a;color:#e74c3c;border:1px solid #5a1a1a}

.bk-genre{font-size:9px;color:#9b59b6;margin-top:1px}

.bk-sec{margin-bottom:12px}
.bk-sl{font-size:8px;color:#D4AF37;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}

Object.assign(CONTACTS, {
  1:{manager:"Shivani Brooking — Wildlife Entertainment (Ian McAndrew, founder)",mgmtEmail:"shivani@wildlife-entertainment.com",booking:"Will Church — ROAM Artists (formerly ATC Live)",bookingEmail:"will.church@roamartists.com",tip:"will.church@roamartists.com also books Big Thief — one pitch, two artists. Shivani Brooking is day-to-day at Wildlife. Physical mailer to Wildlife goes a long way with this team. Fontaines run their own online store at fontainesdc.com — pitch around tour-exclusive co-branded merch."},
  2:{manager:"Simone Ubaldi & Andrew Parisi — Sundowner Artists (Melbourne)",mgmtEmail:"Contact via sundownermusic.co — Simone Ubaldi is active on LinkedIn and speaks at ILMC, BIGSOUND",booking:"Ali Hedrick / Erik Selz — ROAM Artists (N. America); Powerline Agency (AU)",bookingEmail:"ali.hedrick@roamagency.com / erik.selz@roamagency.com",tip:"ali.hedrick@roamagency.com also books Nilüfer Yanya — dual pitch, one email. Simone Ubaldi gave keynotes at ILMC Futures Forum 2025 and BIGSOUND — research her talks before outreach. Lead with durability and authenticity: raw Australian punk band, merch must feel real."},
  3:{manager:"Michelle Cable — Panache Management (handles management + N. America booking)",mgmtEmail:"michelle@panacherock.com",booking:"N. America: Michelle Cable directly (panachebooking@gmail.com); EU/UK: Natasha Gregory — Mother Artists",bookingEmail:"panachebooking@gmail.com / natasha@motherartists.com",tip:"michelle@panacherock.com is a single point of contact for management AND North American booking — unusually direct access for an artist this size. EU: paul@billions.com.au for AU shows. Band releases multiple albums per year; time pitches around major release windows."},
  4:{manager:"Martin Hall — Hall or Nothing",mgmtEmail:"martinhallornothing@gmail.com (James Hall handles day-to-day: jameshallornothing@gmail.com)",booking:"Adele Slater — Wasserman Music",bookingEmail:"adele.slater@teamwass.com",tip:"james@hallornothing.com is the most responsive door. Adele Slater at Wasserman was profiled in Music Week specifically for Wet Leg's touring strategy — she understands the brand intimately. Martin Hall managed Manic Street Preachers for 30+ years; pitch in-person or via warm intro if possible."},
  6:{manager:"No confirmed public manager — route all inquiries through booking agents",mgmtEmail:"Contact via daughtersofcain.com/contact",booking:"Avery McTaggart & Josh Mulder — TBA Agency (US/AU); Matt Copley — Primary Talent International (UK/EU)",bookingEmail:"amctaggart@tbaagency.com / jmulder@tbaagency.com / mattcopley@primarytalent.com",tip:"amctaggart@tbaagency.com also books Big Thief — one agent, two high-priority artists. TBA Agency was founded by former Paradigm agents; Avery McTaggart is a Managing Partner. Lead with visual storytelling and craft — her Gothic Southern Americana aesthetic is unmerchandisable with generic product. 2026 North American tour extension = active merch conversations happening now."},
  11:{manager:"Mac Cregan — Brilliant Corners Artist Management",mgmtEmail:"mac@brilliantcorners.com",booking:"Wilson Zheng — High Road Touring (N. America/Asia)",bookingEmail:"wilson@highroadtouring.com",tip:"wilson@highroadtouring.com also books Mitski. Soccer Mommy announced a co-headline tour with Snail Mail (June 2026) — active cycle, ideal timing. Mac Cregan at Brilliant Corners is a boutique shop where he answers directly. Lead with tour-exclusive merch concepts."},
  12:{manager:"Will Perliter — R&R Records (co-founder with Dijon; also Mixed Management)",mgmtEmail:"Contact Will Perliter via mkgee.com or LinkedIn (active and reachable)",booking:"Tom Schroeder & Michael Harvey-Bray — Wasserman Music (London/global); Erik Selz — ROAM (N. America)",bookingEmail:"tom.schroeder@teamwass.com / erik.selz@roamagency.com",tip:"tom.schroeder@teamwass.com also books Fred again.. internationally — dual high-priority pitch. Mk.gee closed Lollapalooza 2025. Will Perliter wears many hats (manager + label co-founder) so lead with creative collaboration not vendor pitch. His icu.studio visual team values genuine creative partners."},
  14:{manager:"Darin Harmon — Blue Raincoat Artists",mgmtEmail:"darin@blueraincoatmusic.com",booking:"Dave Rowan — High Road Touring (N. America); Josh Javor — WME (Rest of World); also Messina Touring Group (large production)",bookingEmail:"dave@highroadtouring.com / josh.javor@wmeagency.com",tip:"Bridgers returned to performing in May 2026 after ~3-year hiatus. Re-emerging artist window = prime moment for merch infrastructure before her next album cycle. josh.javor@wmeagency.com also books Boygenius — one agent for two acts. Reach Darin Harmon directly now."},
  16:{manager:"Tom Wironen — Friendly Announcer",mgmtEmail:"tom@friendlyannouncer.com",booking:"Avery McTaggart — TBA Agency (N. America); Will Church — ROAM (EU/UK)",bookingEmail:"avery@tbaagency.com / will.church@roamartists.com",tip:"will.church@roamartists.com books both Big Thief AND Fontaines D.C. — one agent, two flagship artists. Big Thief announced a massive 2026 tour (20K tickets sold in London alone). Tom Wironen is a Harvard Law grad turned manager — detail-oriented and strategic. Timing is excellent. amctaggart@tbaagency.com covers both Big Thief and Ethel Cain in North America."},
  17:{manager:"Dalton Sim — Good Harbor Management",mgmtEmail:"dalton@goodharbormusic.com",booking:"Josh Javor — WME (UK/EU); Dave Rowan — High Road Touring (N. America)",bookingEmail:"josh.javor@wmeagency.com / dave@highroadtouring.com",tip:"dalton@goodharbormusic.com also manages Lucy Dacus — one manager, two artists. josh.javor@wmeagency.com books both Boygenius and Phoebe Bridgers. Band is on hiatus with solo projects active in 2025-26; best window is approaching Dalton now ahead of any reunion cycle."},
  18:{manager:"Ryan Matteson — Ten Atoms (Austin, TX)",mgmtEmail:"ryan@tenatoms.com",booking:"Merrick Jarmulowicz — Ground Control Touring",bookingEmail:"merrick@groundcontroltouring.com",tip:"ryan@tenatoms.com also manages Black Pumas and The Mountain Goats — indie-minded and reachable. Merrick Jarmulowicz has a famous origin story with Michelle Zauner: she wrote \"please book me someday\" on a Bandcamp order to him in 2015. Merch proposals should go through management first (Ten Atoms)."},
  19:{manager:"Reynold \"Rennie\" Jaffe — Another Management Company",mgmtEmail:"Contact via anothermgmtco.com — boutique, Jaffe answers personally",booking:"Timmy Hefner — Ground Control Touring (N. America)",bookingEmail:"timmy@groundcontroltouring.com",tip:"timmy@groundcontroltouring.com also books Parquet Courts — dual pitch opportunity. Another Management also reps Waxahatchee, Alvvays, and Horsegirl — one relationship with Rennie Jaffe could unlock multiple artists. Third album \"Ricochet\" dropped March 2026 = prime merch cycle now."},
  20:{manager:"Dalton Sim — Good Harbor Music",mgmtEmail:"dalton@goodharbormusic.com — also active on LinkedIn",booking:"Paul Wilson — CAA London",bookingEmail:"paul.wilson@caa.com",tip:"dalton@goodharbormusic.com also manages Boygenius — one manager, two acts. Good Harbor also manages Mitski and Father John Misty — selective and relationship-driven. Lucy ran a lottery-ticketed museum tour in 2025 signaling she values curated, intentional presentation. Lead with exclusivity and craft."},
  21:{manager:"Caroline Trout — Red Light Management (London)",mgmtEmail:"caroline.trout@redlightmanagement.com",booking:"Ali Hedrick / Erik Selz — ROAM Artists",bookingEmail:"ali.hedrick@roamagency.com / erik.selz@roamagency.com",tip:"ali.hedrick@roamagency.com also books Amyl and the Sniffers — one pitch, two artists. Ali Hedrick and Erik Selz are co-founders of ROAM, not junior agents. Research Caroline Trout's interviews on management philosophy before reaching out; she values thoughtful, researched pitches."},
  22:{manager:"James Oldham (and Jeanette Lee) — Rough Trade Management",mgmtEmail:"management@parquet-courts.com (confirmed direct email from official parquet-courts.com/contact)",booking:"Timmy Hefner — Ground Control Touring (N. America); Russell Warby — WME (Rest of World)",bookingEmail:"timmy@groundcontroltouring.com / russell.warby@wmeagency.com",tip:"management@parquet-courts.com is a verified, confirmed direct email — rare and highly valuable. timmy@groundcontroltouring.com also books Snail Mail. James Oldham (@Jamesloog on X) is publicly active. Politically engaged NYC art-punk intellectuals — merch must be thoughtful, design-forward, never generic."},
  49:{manager:"Alberto Bragado — Prime Culture (London); also Director of Solid Grooves LTD",mgmtEmail:"alberto@prime-culture.com (publicly confirmed across multiple industry sources)",booking:"Liaison Artists (N. America); Oltrebooking (Italy/Spain); Align Agency (UK)",bookingEmail:"booking@liaisonartists.com (N. America) / info@oltrebooking.com (Italy/Spain)",tip:"alberto@prime-culture.com is one of the most directly confirmed management emails in electronic music. Carlita is Lebanese-Canadian, Ibiza/London-based, signed to Ninja Tune, confirmed Coachella 2026. At a scale where manager access is still real — go direct to Alberto with a specific merch concept and a visual reference."},
  51:{manager:"Holt Harmon & Parker Cohen — Metatone Management (Phoenix, AZ)",mgmtEmail:"holt@metatone.com",booking:"Benjamin Shprits — Wasserman Music / THE TEAM (Americas)",bookingEmail:"benjamin.shprits@teamwass.com",tip:"Holt Harmon is young, deal-hungry, and not hiding behind WME bureaucracy — very reachable. John Summit runs his own label Experts Only (#1 on Beatport 2024). Pitch Metatone directly with a specific product proposal tied to Experts Only branding. Holt Harmon has a public LinkedIn and spoke at the Billboard Live Music Summit."},
  52:{manager:"Danny Robson & Samuel Beck — Leisurely (Sydney-based)",mgmtEmail:"danny@leisurely.com.au",booking:"Alex Becket — CAA",bookingEmail:"alex.becket@caa.com",tip:"alex.becket@caa.com architected RÜFÜS DU SOL's highest-grossing electronic tour of all time (Inhale/Exhale) — cited by Pollstar specifically. Reach Becket with merch revenue data showing per-show potential. Management is in Sydney — time-zone awareness matters for calls."},
  53:{manager:"Brett Fischer & Morgan Langworthy — AYITA (Los Angeles)",mgmtEmail:"brett@ayita.com (Chris Lake himself publicly tweeted this email)",booking:"Cody Chapman (Americas) / Dave Blackgrove (Europe) — Wasserman Music",bookingEmail:"cchapman@teamwass.com / dave.blackgrove@teamwass.com",tip:"brett@ayita.com is the most artist-verified email contact on this list. AYITA also manages Fisher, Nero, and GTA — one management relationship, multiple artists. Their Circuit Group/Seven20 partnership means they actively seek artist IP business opportunities. Go to Brett first, not the booking agent."},
  54:{manager:"Tom Deffee & Jess Plummer — Solar Management (London)",mgmtEmail:"tom@solarmanagement.co.uk (confirmed via Solar Management website)",booking:"Evan Hancock (N/S America) — Wasserman; EU: Eat Your Own Ears",bookingEmail:"evan.hancock@teamwass.com / fourtet@eatyourownears.com",tip:"Four Tet (Kieran Hebden) has had very public disputes with record labels over rights — approach with creator-controlled, artist-led framing. Any merch must feel like art, not product. Solar is small and artist-first — Tom Deffee is the day-to-day and directly reachable. evan.hancock@teamwass.com also books Mall Grab."},
  55:{manager:"Steve Satterthwaite — Red Light Management (Electronic Division, LA)",mgmtEmail:"steve.satterthwaite@redlightmanagement.com",booking:"Steve Nickolls — UTA (Rest of World); Wasserman Music (N/S America)",bookingEmail:"steve.nickolls@unitedtalent.com",tip:"Steve Satterthwaite speaks publicly at ADE (Amsterdam Dance Event) — great place to make the connection in person. Bonobo relocated to LA in 2021. Festival/arts-world audience; merch tied to his natural, travel-oriented visual aesthetic will land better than generic drops. ADE in October is the ideal moment for an in-person intro."},
  56:{manager:"Oli Isaacs & Simon Gold — This Is Music Ltd (London)",mgmtEmail:"oli@thisismusicltd.com (confirmed via RocketReach)",booking:"Ryan Smith (Americas) / John Humphrey (Europe/Asia) — Liaison Artists",bookingEmail:"ryan.smith@liaisonartists.com / john.humphrey@liaisonartists.com",tip:"Bicep and Oli Isaacs won the Artist & Manager Awards Innovation Award 2021 — he talks about it publicly and values creative collaboration. Liaison Artists is an independent electronic-specialist agency (SF-based). The duo's passion for visual identity means any merch concept must arrive with strong creative references — geometric, club-focused, iconic."},
  57:{manager:"Ellie Shaw / Oliver Sasse — Goodlife Management (Firebird acquired majority stake 2026)",mgmtEmail:"ellie@goodlifemanagement.co.uk",booking:"Evan Hancock (N. America) / Tom Schroeder (Europe/RoW) — Wasserman Music",bookingEmail:"evan.hancock@teamwass.com / tom.schroeder@teamwass.com",tip:"tom.schroeder@teamwass.com also books Mk.gee internationally — dual high-priority pitch, one email. Fred runs an intimacy-first touring model; any merch must feel community-forward, not commercial. Goodlife/Firebird are the real gatekeepers — go through Ellie Shaw, not the booking desk."},
  58:{manager:"FYI Agency (management); route first contact through Wasserman",mgmtEmail:"mallgrab@teamwass.com (Wasserman Americas artist contact)",booking:"Fred Zahedinia — Wasserman Music (Americas); WME (Europe/Oceania)",bookingEmail:"fzahedinia@teamwass.com",tip:"Mall Grab (Jordon Alexander) is Australian, underground, lo-fi aesthetic, co-owner of Steel City Dance Discs. evan.hancock@teamwass.com also covers. Limited, collectible drops with underground credibility only — avoid anything mass-market. WME handles EU and Asia/Oceania separately from Wasserman Americas."},
  61:{manager:"Andy Musgrave — Supernature (also manages AJ Tracey and Conducta)",mgmtEmail:"andy@supernature.co.uk",booking:"Niklaus Buehler — Emerged Agency",bookingEmail:"niklaus.buehler@emerged-agency.com (confirmed on Emerged Agency artist page)",tip:"niklaus.buehler@emerged-agency.com is directly confirmed from Emerged Agency's own site. Sega Bodega produced for Caroline Polachek, Shygirl, Rosalía/Björk. Andy Musgrave runs an independent shop — faster decisions. Art-school, avant-garde, fashion-adjacent audience: premium/limited/conceptual merch only. Album \"Dennis\" (2025) is the natural narrative hook."},
  71:{manager:"Anthony \"Moosa\" Tiffith Jr. — Top Dawg Entertainment (TDE)",mgmtEmail:"moosa@txdxe.com",booking:"Zach Iser & Caroline Yim — UTA (moved from WME to UTA as Partners, April 2025)",bookingEmail:"zach.iser@unitedtalent.com / caroline.yim@unitedtalent.com",tip:"moosa@txdxe.com — Moosa Tiffith is not just her label president but personally manages creative direction. He is the real decision-maker on ALL partnerships. Zach Iser and Caroline Yim are among the hottest hip-hop agents working right now. Reference her Grammy win (Best Rap Album 2025) and \"Live From the Swamp\" tour in your opening."},
  73:{manager:"Henny Yegezu — EQT (Equative Thinking) / Zero Fatigue collective",mgmtEmail:"henny@eqtmgmt.com",booking:"Noah Simon — UTA",bookingEmail:"noah.simon@unitedtalent.com (confirmed on UTA's public roster page)",tip:"noah.simon@unitedtalent.com is confirmed on UTA's public roster page. Smino recently signed to Motown through the Zero Fatigue imprint. Lead as a brand-building opportunity that extends his independent ethos. Fanbase skews heavily toward limited-run streetwear — not standard merch buyers."},
  74:{manager:"Cristela Rodriguez — Saba Pivot LLC (independent)",mgmtEmail:"cristela@sabapivot.com (confirmed via RocketReach)",booking:"Contact through management — Cristela handles all business inquiries directly",bookingEmail:"cristela@sabapivot.com",tip:"Cristela Rodriguez has managed Saba since his early career and is the closest business confidante. Saba is deeply community-oriented and Chicago-rooted — lead with values alignment and limited/local merch concepts. She responds better to personal, specific outreach over generic cold email. Never use a template approach here."},

async function generatePitch(id){
  var sid=String(id);
  var artist=allArtists().find(function(a){return String(a.id)===sid;});
  if(!artist)return;
  var el=document.getElementById('pitch-'+sid);
  if(!el)return;
  el.innerHTML='<div class="pitch-loading"><div class="pitch-spin"></div>Generating El Famoso pitch cheatsheet...</div>';
  var c=CONTACTS[artist.id]||{};
  var payload=JSON.stringify({name:artist.name,genre:artist.genre,label:artist.label,monthlyListeners:artist.spotify,management:artist.mgmt,tourSchedule:artist.tour,merchGap:artist.gap,elFamosoOpportunity:artist.opp,priority:artist.priority,manager:c.manager||artist.managerName||null,bookingAgency:c.booking||artist.bookingAgency||null,outreachTip:c.tip||artist.contactTip||null});
  var prompt="You are El Famoso's outreach strategist. El Famoso is the operational infrastructure behind creators ready to scale: manufacturing, design, 3PL fulfillment, and brand strategy.\n\nGenerate a sharp, peer-voiced pre-pitch cheat sheet for this prospect. Be SPECIFIC to this artist. Sound like a smart colleague giving real intel, not a vendor pitching.\n\nUse EXACTLY this format:\n\n**OPENING LINE OPTIONS**\n> Option A (warm/curious): [references something real about their situation]\n> Option B (direct/confident): [punchy, peer-to-peer]\n> Option C (fan angle): [references fan behavior or community signal]\n\n**DISCOVERY QUESTIONS**\n[4 bullet questions that diagnose their specific friction]\n\n**EL FAMOSO POSITIONING**\nWe [do what] for [who] so they can [outcome].\n\n[1-2 sentences on why El Famoso and why NOW]\n\n**LIKELY OBJECTIONS**\n[2-3 bullets: their words + reframe]\n\n**THE ASK**\n[HIGH=Direct Ask, MEDIUM=Option Close, LOW=Soft Plant]\n\n**THE READ**\n[One sentence: readiness, angle, watchout]";
  try{
    if(!window.cowork||!window.cowork.askClaude)throw new Error('no AI');
    var result=await window.cowork.askClaude(prompt,[payload]);
    pitchCache[sid]=result;savePitchToLS(sid,result);showPitch(sid,result);
  }catch(err){
    var fb=templatePitch(artist);pitchCache[sid]=fb;savePitchToLS(sid,fb);showPitch(sid,fb);
  }
}

function templatePitch(a){
  var u=a.priority==='HIGH'?'HIGH':a.priority==='MEDIUM'?'MEDIUM':'LOW';
  var ask=u==='HIGH'?"Based on what I'm seeing, there's a real gap costing you now. I'd love a 20-minute call this week to walk through what we'd do for "+a.name+"'s touring cycle. Open to that?":u==='MEDIUM'?"We could start with a single tour-aligned drop or go straight into full 3PL partnership — either works. Which feels more aligned with where you're trying to go?":"Worth keeping in mind as you scale. I'll send something over showing how we've done this for artists at your stage — no pressure.";
  var read=a.priority==='HIGH'?"High urgency — the gap is real and visible. Lead with the operational angle, not the creative one.":"Discovery first — they need to see the problem before they'll see the solution.";
  return "**OPENING LINE OPTIONS**\n> Option A (warm/curious): \"I was looking at your setup — "+a.spotify+" monthly listeners and a real moment happening, but the merch doesn't match it.\"\n> Option B (direct/confident): \"We work with independent artists at your level who are leaving serious merch revenue on the table. "+a.name+" fits that profile.\"\n> Option C (fan angle): \"Your fans are the type who buy before they even see the product. That loyalty isn't being fully converted right now.\"\n\n**DISCOVERY QUESTIONS**\n• What does your current merch process look like end-to-end — who handles fulfillment when you're on the road?\n• What's the most frustrating part of your current merch situation — quality, inventory, timing, or something else?\n• If you had to guess what you're leaving on the table in merch revenue annually, what would that number be?\n• What would need to be true for a merch partnership to feel like a no-brainer?\n\n**EL FAMOSO POSITIONING**\nWe build the operational merch infrastructure for artists like "+a.name+" so you can stop managing logistics and start treating merch as a real revenue channel.\n\n"+(a.opp||"El Famoso handles manufacturing, design direction, and 3PL fulfillment so your touring cycle drives merch revenue instead of eating it.")+"\n\n**LIKELY OBJECTIONS**\n• \"We already have someone handling merch\" → The question isn't who's doing it — it's whether what you have can scale with the audience you're building. Most solutions break at 1M+ listeners.\n• \"I'd need to talk to my manager\" → Totally fair — managers often feel this pain more acutely. We'd love an intro.\n\n**THE ASK**\n"+ask+"\n\n**THE READ**\n"+read;
}

function copyPitch(id,e){if(e)e.stopPropagation();var t=getCachedPitch(String(id))||'';navigator.clipboard.writeText(t).catch(function(){});var b=e.target;var o=b.textContent;b.textContent='Copied';setTimeout(function(){b.textContent=o;},2000);}

function mdToHtml(md){
  var lines=md.split('\n');var out='';var ul=false;
  for(var i=0;i<lines.length;i++){
    var t=lines[i].trim();
    if(!t){if(ul){out+='</ul>';ul=false;}continue;}
    if(/^\*\*[A-Z][A-Z\s\/]+\*\*$/.test(t)){if(ul){out+='</ul>';ul=false;}out+='<h4>'+t.replace(/\*\*/g,'')+'</h4>';continue;}
    if(t.startsWith('**THE READ**')){if(ul){out+='</ul>';ul=false;}var r=t.replace('**THE READ**','').replace(/^[:\s]+/,'');out+='<div class="pitch-read"><strong>THE READ</strong>'+(r?' — '+inMd(r):'')+'</div>';continue;}
    if(t.startsWith('> ')){if(ul){out+='</ul>';ul=false;}out+='<blockquote>'+inMd(t.slice(2))+'</blockquote>';continue;}
    if(/^[•\-\*] /.test(t)){if(!ul){out+='<ul>';ul=true;}out+='<li>'+inMd(t.replace(/^[•\-\*] /,''))+'</li>';continue;}
    if(ul){out+='</ul>';ul=false;}
    out+='<p>'+inMd(t)+'</p>';
  }
  if(ul)out+='</ul>';
  return out;
}
function inMd(s){return s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/→/g,'<span style="color:#D4AF37">→</span>');}

    +'<div class="f"><label>Genre Group</label><select id="rf-group">'+gs.map(function(g){return'<option'+(g===gg?' selected':'')+'>'+g+'</option>';}).join('')+'</select></div>'
    +'<div class="f"><label>Label</label><input id="rf-label" value="'+esc(d.label||'')+'" placeholder="e.g. Matador (indie)"/></div>'
    +'<div class="f"><label>Spotify Listeners</label><input id="rf-spotify" value="'+esc(d.spotify||'')+'" placeholder="e.g. 2.4M"/></div>'
    +'<div class="f"><label>Management</label><input id="rf-mgmt" value="'+esc(d.mgmt||'')+'" placeholder="Self-managed"/></div>'
    +'<div class="f"><label>Priority</label><select id="rf-priority">'+ps.map(function(p){return'<option'+(p===pri?' selected':'')+'>'+p+'</option>';}).join('')+'</select></div>'
    +'<div class="f"><label>Instagram</label><input id="rf-ig" value="'+esc(d.ig||'')+'" placeholder="@handle"/></div>'
    +'<div class="f"><label>TikTok</label><input id="rf-tiktok" value="'+esc(d.tiktok||'')+'" placeholder="@handle"/></div>'
    +'<div class="f"><label>Website</label><input id="rf-site" value="'+esc(d.site||'')+'" placeholder="artist.com"/></div>'
    +'<div class="f full"><label>Tour Schedule</label><input id="rf-tour" value="'+esc(d.tour||'')+'" placeholder="e.g. NA headline tour 2026"/></div>'
    +'<div class="f full"><label>Merch Gap Notes</label><textarea id="rf-gap" placeholder="What is missing or weak...">'+esc(d.gap||'')+'</textarea></div>'
    +'<div class="f full"><label>El Famoso Opportunity</label><textarea id="rf-opp" placeholder="Why we pitch them, what we offer...">'+esc(d.opp||'')+'</textarea></div>'
    +'<div class="sec-div"><div class="sec-div-label">Contact Intelligence</div></div>'
    +'<div class="f"><label>Manager Name</label><input id="rf-mgr" value="'+esc(d.managerName||'')+'" placeholder="e.g. Sophie Lev"/></div>'
    +'<div class="f"><label>Mgmt Email / Contact</label><input id="rf-mgmt-email" value="'+esc(d.mgmtEmail||'')+'" placeholder="e.g. info@mgmt.com"/></div>'
    +'<div class="f"><label>Booking Agency</label><input id="rf-booking" value="'+esc(d.bookingAgency||'')+'" placeholder="e.g. WME, CAA"/></div>'
    +'<div class="f"><label>Booking Email / Contact</label><input id="rf-booking-email" value="'+esc(d.bookingEmail||'')+'" placeholder="e.g. booking@caa.com"/></div>'
    +'<div class="f full"><label>Gold Outreach Tip</label><input id="rf-tip" value="'+esc(d.contactTip||'')+'" placeholder="Best tactical first-contact advice"/></div>'
    +'<div class="macts full"><button class="bcancel" onclick="closeResearch()">Cancel</button><button class="bprimary" onclick="confirmAdd()">Add to Dashboard</button></div>'
    +'</div>';
}
function confirmAdd(){
  var name=(document.getElementById('rf-name').value||'').trim();
  if(!name){alert('Artist name is required.');return;}
  var cc=getCustom();var nid='C'+Date.now();
  cc.push({id:nid,name:name,genre:document.getElementById('rf-genre').value.trim()||'-',genreGroup:document.getElementById('rf-group').value,label:document.getElementById('rf-label').value.trim()||'-',spotify:document.getElementById('rf-spotify').value.trim()||'-',mgmt:document.getElementById('rf-mgmt').value.trim()||'-',ig:document.getElementById('rf-ig').value.trim()||'',tiktok:document.getElementById('rf-tiktok').value.trim()||'',site:document.getElementById('rf-site').value.trim()||'',tour:document.getElementById('rf-tour').value.trim()||'-',gap:document.getElementById('rf-gap').value.trim()||'-',opp:document.getElementById('rf-opp').value.trim()||'-',priority:document.getElementById('rf-priority').value,managerName:document.getElementById('rf-mgr').value.trim()||'',mgmtEmail:document.getElementById('rf-mgmt-email').value.trim()||'',bookingAgency:document.getElementById('rf-booking').value.trim()||'',bookingEmail:document.getElementById('rf-booking-email').value.trim()||'',contactTip:document.getElementById('rf-tip').value.trim()||'',custom:true,addedAt:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})});
  saveCustom(cc);document.getElementById('add-name').value='';closeResearch();render();
}
function closeResearch(){document.getElementById('roverlay').classList.remove('open');}
function updateStatus(id,val){saveState(id,'status',val);render();}
function updateNotes(id,val){saveState(id,'notes',val);}
function toggleNotes(id,e){if(e)e.stopPropagation();var sid=String(id);if(openNotes.has(sid))openNotes.delete(sid);else openNotes.add(sid);var el=document.getElementById('na-'+sid);if(el)el.style.display=openNotes.has(sid)?'block':'none';}
function deleteCustom(id,e){if(e)e.stopPropagation();if(!confirm('Remove this prospect?'))return;saveCustom(getCustom().filter(function(a){return String(a.id)!==String(id);}));render();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

var DDOT={Rock:'d-Rock',EDM:'d-EDM',HipHop:'d-HipHop',Pop:'d-Pop',Country:'d-Country',Custom:'d-Custom'};
var PCLS={HIGH:'p-HIGH',MEDIUM:'p-MEDIUM',LOW:'p-LOW'};
var STATUSES=['Not Contacted','Reached Out','Responded','Meeting Set','Proposal Sent','Closed','Not Interested','Archived'];

function render(){
  var q=(document.getElementById('search').value||'').toLowerCase();
  var state=getState();var all=allArtists();
  var filtered=all.filter(function(a){
    var as=(state[a.id]||{}).status||'Not Contacted';
    if(sf==='ALL'&&as==='Archived')return false;
    if(pf!=='ALL'&&a.priority!==pf)return false;
    if(sf!=='ALL'&&as!==sf)return false;
    if(gf==='MY'&&!a.custom)return false;
    if(gf!=='ALL'&&gf!=='MY'&&a.genreGroup!==gf)return false;
    if(q&&![a.name,a.genre,a.label,a.mgmt].join(' ').toLowerCase().includes(q))return false;
    return true;
  });
  var allSt=all.map(function(a){return(state[a.id]||{}).status||'Not Contacted';});
  var arcN=allSt.filter(function(s){return s==='Archived';}).length;
  document.getElementById('sn-tot').textContent=filtered.length;
  document.getElementById('sn-rock').textContent=all.filter(function(a){return a.genreGroup==='Rock';}).length;
  document.getElementById('sn-edm').textContent=all.filter(function(a){return a.genreGroup==='EDM';}).length;
  document.getElementById('sn-ctr').textContent=all.filter(function(a){return a.genreGroup==='Country';}).length;
  document.getElementById('sn-ctd').textContent=allSt.filter(function(s){return!['Not Contacted','Not Interested','Archived'].includes(s);}).length;
  document.getElementById('sn-cls').textContent=allSt.filter(function(s){return s==='Closed';}).length;
  document.getElementById('rcnt').textContent=filtered.length===all.length?'':'Showing '+filtered.length+' of '+all.length+' prospects';
  var ab=document.getElementById('abanner');
  if(sf==='Archived'){ab.innerHTML='<div class="abanner">📁 <strong>Archived</strong> — '+arcN+' prospect'+(arcN!==1?'s':'')+' stored. Change status to restore.</div>';}
  else if(arcN>0){ab.innerHTML='<div class="abanner" onclick="document.querySelector(\'.archive-pill-trigger\').click()">📁 <strong>'+arcN+'</strong> archived — <span style=\'color:#D4AF37\'>View archived →</span></div>';}
  else{ab.innerHTML='';}
  var grid=document.getElementById('grid');
  if(!filtered.length){grid.innerHTML='<div class="empty"><div class="empty-ico">🔍</div><div>No prospects match your filters</div></div>';return;}
  grid.innerHTML=filtered.map(function(a){
    var sid=String(a.id);
    var as=(state[a.id]||{}).status||'Not Contacted';
    var an=(state[a.id]||{}).notes||'';
    var isC=!!a.custom;
    var igH=(a.ig||'').replace('@','');var ttH=(a.tiktok||'').replace('@','');var hasSite=a.site&&a.site!=='N/A'&&a.site!=='';
    var ct=CONTACTS[a.id]||{};
    var mgr=ct.manager||a.managerName||'';var mgmtE=ct.mgmtEmail||a.mgmtEmail||'';
    var bkA=ct.booking||a.bookingAgency||'';var bkE=ct.bookingEmail||a.bookingEmail||'';
    var tip=ct.tip||a.contactTip||'';
    var isFlipped=flippedSet.has(sid);var cached=getCachedPitch(sid);
    var pitchInner=isFlipped?(cached?'<div class="pitch-content">'+mdToHtml(cached)+'</div><div class="pitch-actions"><button class="pact" onclick="regenPitch(\''+sid+'\',event)">↻ Regenerate</button><button class="pact" onclick="copyPitch(\''+sid+'\',event)">Copy</button></div>':'<div class="pitch-loading"><div class="pitch-spin"></div>Generating pitch cheatsheet...</div>'):'<div class="pitch-empty">Flip the card to generate a personalized pitch cheatsheet.</div>';
    var soc='';
    if(igH)soc+='<a class="soclink" href="https://instagram.com/'+igH+'" target="_blank" onclick="event.stopPropagation()">IG @'+igH+'</a>';
    if(ttH)soc+='<a class="soclink" href="https://tiktok.com/@'+ttH+'" target="_blank" onclick="event.stopPropagation()">TT @'+ttH+'</a>';
    if(hasSite)soc+='<a class="soclink" href="https://'+a.site.replace(/^https?:\/\//,'')+'" target="_blank" onclick="event.stopPropagation()">🌐 '+esc(a.site)+'</a>';
    return '<div class="cw'+(isFlipped?' flipped':'')+'" id="cw-'+sid+'" data-status="'+as+'">'
      +'<div class="ci">'
      +'<div class="cf'+(isC?' custom':'')+'" onclick="doFlip(\''+sid+'\',event)">'
        +'<div class="ch"><div class="ctop"><div><div class="aname">'+esc(a.name)+'</div><div class="flip-hint">↩ click for contacts + pitch</div></div><div class="bgs">'+(isC?'<span class="cbadge">★ MINE</span>':'')+'<div class="gdot '+(DDOT[a.genreGroup]||'d-Custom')+'" title="'+a.genreGroup+'"></div><div class="pb '+(PCLS[a.priority]||'')+'">'+a.priority+'</div></div></div><div class="gtag">'+esc(a.genre)+' · '+esc(a.label)+'</div><div class="tdates">🗓 '+esc(a.tour)+'</div></div>'
        +'<div class="cmeta"><span class="mi"><strong>'+esc(a.spotify)+'</strong> listeners</span><span class="mi" style="color:#2a2a2a">·</span><span class="mi">'+esc(a.mgmt)+'</span></div>'
        +'<div class="cbody"><div class="mgap">'+esc(a.gap)+'</div></div>'
        +'<div class="srow" onclick="event.stopPropagation()"><span class="slabel">Status</span><select class="ssel" onchange="updateStatus(\''+sid+'\',this.value)">'+STATUSES.map(function(s){return'<option'+(as===s?' selected':'')+'>'+s+'</option>';}).join('')+'</select><span class="ntog" onclick="toggleNotes(\''+sid+'\',event)">▼ Notes</span>'+(isC?'<button class="delbtn" onclick="deleteCustom(\''+sid+'\',event)">✕</button>':'')+'</div>'
        +'<div class="narea" id="na-'+sid+'" style="'+(openNotes.has(sid)?'display:block':'display:none')+'"><textarea placeholder="Outreach notes..." onchange="updateNotes(\''+sid+'\',this.value)">'+esc(an)+'</textarea></div>'
      +'</div>'
      +'<div class="cb">'
        +'<div class="bk-head"><div><div class="bk-aname">'+esc(a.name)+'</div><div class="bk-genre">'+esc(a.genre)+' · '+esc(a.label)+'</div></div><button class="bk-back" onclick="flipBack(\''+sid+'\',event)">↩ Flip back</button></div>'
        +'<div class="bk-sec"><div class="bk-sl">Contact Intelligence</div><div class="crows">'
          +(mgr?'<div class="crow"><span class="cico">👤</span><div><div class="crole">Manager</div><div class="cval">'+esc(mgr)+'</div>'+(mgmtE?'<div class="cemail">'+esc(mgmtE)+'</div>':'')+'</div></div>':'')
          +(bkA?'<div class="crow"><span class="cico">🎤</span><div><div class="crole">Booking Agency</div><div class="cval">'+esc(bkA)+'</div>'+(bkE?'<div class="cemail">'+esc(bkE)+'</div>':'')+'</div></div>':'')
          +(soc?'<div class="crow"><span class="cico">📱</span><div><div class="crole">Socials</div><div class="soclinks">'+soc+'</div></div></div>':'')
        +'</div>'+(tip?'<div class="ctip">'+esc(tip)+'</div>':'')+'</div>'
        +'<div class="bk-pitch"><div class="bk-sl">El Famoso Pitch Cheatsheet</div><div id="pitch-'+sid+'">'+pitchInner+'</div></div>'
      +'</div>'
      +'</div></div>';
  }).join('');
  flippedSet.forEach(function(sid){if(!getCachedPitch(sid))generatePitch(sid);});
}

render();

</script>
</body>
</html>
